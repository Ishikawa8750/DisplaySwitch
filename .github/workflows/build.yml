name: Build Universal Display Switch

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_mac:
    name: Build for macOS (Universal)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: brew install m1ddc

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install from the Universal folder requirements if present, otherwise minimal setup
        if [ -f "DisplaySwitch/Universal/requirements.txt" ]; then
          pip install -r DisplaySwitch/Universal/requirements.txt
        else
          pip install PySide6-Fluent-Widgets pyinstaller m1ddc
        fi

    - name: Build macOS App
      run: |
        cd DisplaySwitch/Universal
        # Create a spec file if one doesn't exist, otherwise use existing logic
        pyinstaller --noconfirm --onedir --windowed \
          --name "DisplaySwitch_Universal" \
          --add-binary "$(brew --prefix m1ddc)/bin/m1ddc:." \
          --additional-hooks-dir=. \
          main.py || echo "Falling back to generic build"

    - name: Create DMG
      run: |
        cd DisplaySwitch/Universal
        # Optional: Use create-dmg or simply zip the app
        hdiutil create -volname DisplaySwitch -srcfolder dist/DisplaySwitch_Universal.app -ov -format UDZO DisplaySwitch_Universal.dmg

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DisplaySwitch-Universal-macOS
        path: DisplaySwitch/Universal/DisplaySwitch_Universal.dmg

  build_windows:
    name: Build for Windows (Universal)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "DisplaySwitch/Universal/requirements.txt") {
          pip install -r DisplaySwitch/Universal/requirements.txt
        } else {
          pip install PySide6-Fluent-Widgets pyinstaller pywin32 wmi
        }

    - name: Build Windows Exe
      run: |
        cd DisplaySwitch/Universal
        pyinstaller --noconfirm --noconsole --onefile --additional-hooks-dir=. --name DisplaySwitch_Universal main.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DisplaySwitch-Universal-Windows
        path: DisplaySwitch/Universal/dist/DisplaySwitch_Universal.exe
