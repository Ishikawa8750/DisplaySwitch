name: Build DisplaySwitch

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri_ui/src-tauri

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build C++ native core (CMake)
        shell: pwsh
        run: |
          cmake -S core_native -B core_native/build -DCMAKE_BUILD_TYPE=Release -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTS=OFF
          cmake --build core_native/build --config Release --target displayswitch_ffi

      - name: Verify DLL exists
        shell: pwsh
        run: |
          if (-not (Test-Path "tauri_ui/src-tauri/displayswitch_ffi.dll")) {
            Write-Error "displayswitch_ffi.dll not found in tauri_ui/src-tauri/"
            exit 1
          }
          Write-Host "DLL found: $(Get-Item 'tauri_ui/src-tauri/displayswitch_ffi.dll' | Select-Object -ExpandProperty Length) bytes"

      - name: Install frontend dependencies
        working-directory: tauri_ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri_ui

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DisplaySwitch-Windows
          path: |
            tauri_ui/src-tauri/target/release/bundle/msi/*.msi
            tauri_ui/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: macOS Build (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
            cmake_arch: arm64
          - arch: x86_64
            target: x86_64-apple-darwin
            cmake_arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri_ui/src-tauri

      - name: Build C++ native core (CMake)
        run: |
          cmake -S core_native -B core_native/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_TESTS=OFF
          cmake --build core_native/build --config Release --target displayswitch_ffi

      - name: Copy and codesign dylib
        run: |
          # Find the dylib — CMake output path varies by generator
          DYLIB=$(find core_native/build -name "libdisplayswitch_ffi.dylib" -type f | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: libdisplayswitch_ffi.dylib not found in build tree!"
            find core_native/build -type f -name "*.dylib" || true
            exit 1
          fi
          echo "Found dylib: $DYLIB"
          cp "$DYLIB" tauri_ui/src-tauri/libdisplayswitch_ffi.dylib
          # Ad-hoc codesign dylib to match app's ad-hoc signature
          codesign --force --sign - --timestamp=none tauri_ui/src-tauri/libdisplayswitch_ffi.dylib
          echo "=== Codesign info ==="
          codesign -dvv tauri_ui/src-tauri/libdisplayswitch_ffi.dylib
          ls -la tauri_ui/src-tauri/libdisplayswitch_ffi.dylib
          file tauri_ui/src-tauri/libdisplayswitch_ffi.dylib
          otool -L tauri_ui/src-tauri/libdisplayswitch_ffi.dylib || true

      - name: Install frontend dependencies
        working-directory: tauri_ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri_ui
          args: --target ${{ matrix.target }}

      - name: Ad-hoc codesign app bundle
        run: |
          APP_PATH=$(find tauri_ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "=== Verifying dylib in bundle ==="
            echo "Listing Contents/Resources/:"
            ls -la "$APP_PATH/Contents/Resources/" || echo "Resources/ not found"
            echo "Listing Contents/MacOS/:"
            ls -la "$APP_PATH/Contents/MacOS/" || echo "MacOS/ not found"
            echo "Searching for dylib anywhere in bundle:"
            find "$APP_PATH" -name "*displayswitch_ffi*" -type f || echo "dylib not found in bundle!"

            echo "=== Signing dylib in bundle ==="
            BUNDLE_DYLIB=$(find "$APP_PATH" -name "*displayswitch_ffi*" -type f | head -1)
            if [ -n "$BUNDLE_DYLIB" ]; then
              codesign --force --sign - --timestamp=none "$BUNDLE_DYLIB"
            fi

            echo "=== Signing app with entitlements ==="
            codesign --force --sign - --entitlements tauri_ui/src-tauri/Entitlements.plist --deep --timestamp=none "$APP_PATH"
            codesign --verify --deep --strict "$APP_PATH" || true
            codesign -dvv "$APP_PATH/Contents/MacOS/"* || true
          fi

      - name: Re-create DMG with signed app
        run: |
          APP_PATH=$(find tauri_ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          DMG_PATH=$(find tauri_ui/src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -1)
          if [ -n "$DMG_PATH" ] && [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH")
            DMG_NAME=$(basename "$DMG_PATH")
            DMG_DIR=$(dirname "$DMG_PATH")
            
            echo "Re-creating DMG with signed app..."
            # Create new DMG from signed app
            hdiutil create -volname "DisplaySwitch" -srcfolder "$APP_PATH" \
              -ov -format UDZO "$DMG_DIR/$DMG_NAME"
            
            xattr -cr "$DMG_DIR/$DMG_NAME" 2>/dev/null || true
            echo "DMG re-created: $DMG_DIR/$DMG_NAME"
            ls -la "$DMG_DIR/$DMG_NAME"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DisplaySwitch-macOS-${{ matrix.arch }}
          path: |
            tauri_ui/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri_ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  # ─── Linux Build ───
  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdrm-dev \
            libi2c-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri_ui/src-tauri

      - name: Build C++ native core (CMake)
        run: |
          cmake -S core_native -B core_native/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_TESTS=OFF
          cmake --build core_native/build --config Release --target displayswitch_ffi

      - name: Verify .so exists
        run: |
          if [ ! -f "tauri_ui/src-tauri/libdisplayswitch_ffi.so" ]; then
            SO=$(find core_native/build -name "libdisplayswitch_ffi.so" -type f | head -1)
            if [ -z "$SO" ]; then
              echo "ERROR: libdisplayswitch_ffi.so not found!"
              find core_native/build -type f -name "*.so" || true
              exit 1
            fi
            cp "$SO" tauri_ui/src-tauri/libdisplayswitch_ffi.so
          fi
          echo "SO found: $(stat --printf='%s bytes' tauri_ui/src-tauri/libdisplayswitch_ffi.so)"
          ls -la tauri_ui/src-tauri/libdisplayswitch_ffi.so

      - name: Install frontend dependencies
        working-directory: tauri_ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri_ui

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DisplaySwitch-Linux
          path: |
            tauri_ui/src-tauri/target/release/bundle/deb/*.deb
            tauri_ui/src-tauri/target/release/bundle/appimage/*.AppImage

  # ─── Release job: runs only on v* tags ───
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
